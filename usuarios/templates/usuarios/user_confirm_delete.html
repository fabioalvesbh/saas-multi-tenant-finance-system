<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Excluir usuário - Administração</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #020617; color: #e5e7eb; }
        .page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .card { width: 100%; max-width: 480px; background: #020617; border-radius: 1rem; border: 1px solid rgba(148, 163, 184, 0.35); box-shadow: 0 20px 40px rgba(15, 23, 42, 0.9); padding: 1.75rem 1.75rem 1.5rem; }
        .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; }
        .card-subtitle { font-size: 0.85rem; color: #9ca3af; margin-bottom: 1.2rem; }
        .btn-danger { padding: 0.6rem 0.9rem; border-radius: 999px; border: none; background: linear-gradient(135deg, #dc2626, #b91c1c); color: #fff; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
        .btn-secondary { margin-left: 0.5rem; padding: 0.45rem 0.9rem; border-radius: 999px; border: 1px solid rgba(148, 163, 184, 0.5); background: transparent; color: #e5e7eb; font-size: 0.85rem; cursor: pointer; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
<div class="page">
    <div class="card">
        <div class="card-title">Excluir usuário</div>
        <div class="card-subtitle">Tem certeza que deseja excluir o usuário <strong>{{ user_edit.username }}</strong>{% if user_edit.get_full_name %} ({{ user_edit.get_full_name }}){% endif %}? Esta ação não pode ser desfeita.</div>
        <form method="post" style="display: inline;">
            {% csrf_token %}
            <button type="submit" class="btn-danger">Sim, excluir</button>
        </form>
        <a href="{% url 'usuarios:user_list' %}" class="btn-secondary">Cancelar</a>
    </div>
</div>
</body>
</html>
