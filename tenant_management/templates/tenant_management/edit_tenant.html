{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Editar Tenant – SaaS Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f6f8;
      font-family: "Segoe UI", Roboto, sans-serif;
    }
    .card-custom {
      background: #fff;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.08);
      max-width: 720px;
      margin: 50px auto;
    }
    h2 {
      color: #1A5276;
      font-weight: 600;
      margin-bottom: 25px;
      text-align: center;
    }
    .btn-grf {
      background-color: #1A5276;
      color: #fff;
    }
    .btn-grf:hover {
      background-color: #154360;
    }
    label {
      font-weight: 500;
      margin-top: 15px;
      color: #2c3e50;
    }
    .form-control {
      padding: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<header class="text-center my-4">
  <img src="{% static 'logo/road.png' %}" alt="ROAD Logo" style="max-height: 80px;">
</header>

<div class="card-custom">
  <h2><i class="bi bi-pencil-square me-1"></i> Editar Tenant</h2>

  {% if messages %}
    <div class="mb-3">
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {% for field in form %}
      <div class="mb-3">
        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
        {% endif %}
      </div>
    {% endfor %}

    <div class="mt-4 d-flex justify-content-between">
      <a href="{% url 'tenant_management:tenant_list' %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left-circle me-1"></i> Voltar
      </a>
      <button type="submit" class="btn btn-grf">
        <i class="bi bi-save me-1"></i> Salvar Alterações
      </button>
    </div>
  </form>
</div>

</body>
</html>
