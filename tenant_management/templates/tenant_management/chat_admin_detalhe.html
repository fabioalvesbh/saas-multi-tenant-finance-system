<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Responder Chat – {{ thread.user.email }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">

<div class="container py-4">
  <h3 class="mb-3">Responder Chat – <strong>{{ thread.user.email }}</strong> ({{ thread.tenant.name }})</h3>

  <div class="border rounded bg-white p-3 mb-4" style="max-height: 60vh; overflow-y: auto;">
    {% for m in mensagens %}
      <div class="mb-3 {% if m.from_support %}text-start{% else %}text-end{% endif %}">
        <div class="small text-muted">{{ m.enviada_em|date:"d/m/Y H:i" }}</div>
        <div class="p-2 border rounded {% if m.from_support %}bg-white{% else %}bg-primary text-white{% endif %}">
          {{ m.texto|linebreaks }}
          {% if m.screenshot %}
            <br><img src="{{ m.screenshot.url }}" class="img-fluid mt-2 rounded">
          {% endif %}
        </div>
      </div>
    {% empty %}
      <p class="text-muted">Nenhuma mensagem ainda.</p>
    {% endfor %}
  </div>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <textarea name="texto" class="form-control mb-2" placeholder="Escreva uma resposta..." required></textarea>
    <input type="file" name="screenshot" class="form-control mb-2">
    <button class="btn btn-success">Enviar Resposta</button>
    <a href="{% url 'tenant_management:chat_admin_painel' %}" class="btn btn-secondary ms-2">Voltar</a>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
